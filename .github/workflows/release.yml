name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            platform: linux-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            suffix: ""
            platform: linux-x86_64-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
            platform: windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            platform: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            platform: macos-aarch64
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev musl-tools

      - name: Fetch dependencies
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: cargo fetch --locked --target ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --workspace --locked --target ${{ matrix.target }}

      - name: Stage binaries for release
        shell: bash
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/overthrone${{ matrix.suffix }}" \
             "staging/overthrone-${{ matrix.platform }}${{ matrix.suffix }}"
          cp "target/${{ matrix.target }}/release/ovt${{ matrix.suffix }}" \
             "staging/ovt-${{ matrix.platform }}${{ matrix.suffix }}"

      - name: Upload staged binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: staging/*
          if-no-files-found: error

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: List artifacts
        shell: bash
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Overthrone ${{ steps.notes.outputs.version }}
          body: |
            ## Overthrone ${{ steps.notes.outputs.version }}

            ### Installation
            Download the binary for your platform from the assets below.

            ### Quick install (Linux/macOS)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Karmanya03/Overthrone/main/install.sh | bash
            ```

            ### Quick install (Windows PowerShell)
            ```powershell
            irm https://raw.githubusercontent.com/Karmanya03/Overthrone/main/install.ps1 | iex
            ```

            ### Build from source
            ```bash
            cargo install overthrone --tag ${{ github.ref_name }}
            ```
          files: |
            artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
