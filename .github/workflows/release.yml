name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Build Linux + Windows (required for release) ──
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # -- Primary target (AD red team tool -> Windows first) --
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: overthrone-windows-x86_64.exe
            binary: overthrone.exe

          # -- Linux (Kali) --
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: overthrone-linux-x86_64
            binary: overthrone

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsmbclient-dev

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.target }}"

      - name: Generate fresh lockfile
        run: cargo generate-lockfile

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p overthrone

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          cp ${{ matrix.binary }} ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          cp ${{ matrix.binary }} ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.asset_name }}
          if-no-files-found: error

  # ── Build macOS (optional — uploads to release when runner is available) ──
  build-macos:
    name: Build overthrone-macos-aarch64
    runs-on: macos-latest
    timeout-minutes: 60
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install macOS dependencies
        run: |
          brew install samba pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix)/lib/pkgconfig:$(brew --prefix samba)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-aarch64-apple-darwin"

      - name: Generate fresh lockfile
        run: cargo generate-lockfile

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin -p overthrone

      - name: Package binary
        run: |
          cd target/aarch64-apple-darwin/release
          cp overthrone overthrone-macos-aarch64
          chmod +x overthrone-macos-aarch64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: overthrone-macos-aarch64
          path: target/aarch64-apple-darwin/release/overthrone-macos-aarch64
          if-no-files-found: error

      - name: Upload to existing release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: target/aarch64-apple-darwin/release/overthrone-macos-aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Create Release (only needs Linux + Windows) ──
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Overthrone ${{ github.ref_name }}

            **Autonomous Active Directory Red Team Framework.**
            Every throne falls. Overthrone makes sure of it.

            ---

            ### One-line install

            **Linux / macOS:**
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Karmanya03/Overthrone/main/install.sh | bash
            ```

            **Windows PowerShell:**
            ```powershell
            irm https://raw.githubusercontent.com/Karmanya03/Overthrone/main/install.ps1 | iex
            ```

            ### Manual download
            | Platform | Binary |
            |---|---|
            | Windows x86_64 | `overthrone-windows-x86_64.exe` |
            | Linux x86_64 | `overthrone-linux-x86_64` |
            | macOS Apple Silicon | `overthrone-macos-aarch64` *(added when runner available)* |

            Download, `chmod +x`, move to PATH. Done.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
