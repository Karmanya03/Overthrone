# cargo-audit ignore list
# These advisories are acknowledged but cannot be resolved at this time.

[advisories]
ignore = [
    # rsa: Marvin Attack timing sidechannel — no fixed version available upstream.
    # Both rsa 0.9.x and 0.10.0-rc.x are affected. We don't use RSA for
    # key-exchange at runtime; it's consumed by sspi/picky for Kerberos PKINIT.
    "RUSTSEC-2023-0071",

    # wasmtime 28.0.1: four advisories. Upgrading to >=36.0.6 or >=40.0.4 is a
    # breaking API change that requires significant rework of the plugin sandbox.
    # Tracked for a future major release.
    "RUSTSEC-2026-0020", # Guest-controlled resource exhaustion in WASI
    "RUSTSEC-2026-0021", # Panic adding excessive fields to wasi:http/types.fields
    "RUSTSEC-2025-0118", # Unsound API access to shared linear memory
    "RUSTSEC-2025-0046", # Host panic with fd_renumber WASIp1 function
]
